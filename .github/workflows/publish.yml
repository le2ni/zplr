name: Publish to NPM

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g., latest, beta, next)"
        required: false
        default: "latest"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm provenance

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Verify generated command support
        run: pnpm run docs:support:check

      - name: Type check Node
        run: pnpm run typecheck

      - name: Type check web
        run: pnpm run typecheck:web

      - name: Build package
        run: pnpm run build

      - name: Smoke test package exports
        run: pnpm run package:check

      - name: Build playground
        run: pnpm run build:web

      - name: Audit production dependencies
        run: pnpm run audit:prod

      - name: Publish to NPM
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pnpm publish --tag ${{ github.event.inputs.tag || 'latest' }} --access public --no-git-checks
          else
            pnpm publish --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
