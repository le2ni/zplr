name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Verify generated command support
        run: pnpm run docs:support:check

      - name: Type check Node
        run: pnpm run typecheck

      - name: Type check web
        run: pnpm run typecheck:web

      - name: Build Node package
        run: pnpm run build

      - name: Smoke test package exports
        run: pnpm run package:check

      - name: Build playground
        run: pnpm run build:web

      - name: Audit production dependencies
        run: pnpm run audit:prod
